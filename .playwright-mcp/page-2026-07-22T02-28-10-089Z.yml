          - heading "Mahogany — Calgary's Largest Private Lake Community" [level=2] [ref=e128]
          - paragraph [ref=e129]: Mahogany holds the distinction of being home to Calgary's largest private lake — a 63-acre body of water that has made this southeast community one of the most awarded master-planned neighbourhoods in Canada. Multiple wins at the Canadian Home Builders' Association Community of the Year awards have established Mahogany as a benchmark for thoughtful community design.
          - paragraph [ref=e130]: From a drone perspective, Mahogany is extraordinary. The sheer scale of the lake — surrounded by private beaches, a 22,000 sq. ft. beach club, and a growing urban village of shops and restaurants — creates aerial compositions that feel more like a resort destination than a Calgary suburb. For listings in Mahogany, aerial photography is not optional; it is essential to communicating why buyers pay a premium to live here.
