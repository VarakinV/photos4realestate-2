            - heading "Do you need a permit for drone photography in Calgary?" [level=3] [ref=e557]
            - paragraph [ref=e558]: Yes. All commercial drone operations in Canada are regulated by Transport Canada. Licensed operators must comply with the Canadian Aviation Regulations (CARs) including maintaining visual line of sight, respecting controlled airspace, and obtaining Special Flight Operations Certificates (SFOCs) where required. Photos 4 Real Estate operates with fully licensed and insured drone pilots.
