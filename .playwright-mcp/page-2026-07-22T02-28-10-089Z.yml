          - heading "Inglewood — Historic Character on the Bow River" [level=2] [ref=e300]
          - paragraph [ref=e301]: Inglewood is Calgary's oldest neighbourhood — a creative, character-rich community that has evolved from a 19th-century settlement into one of the city's most sought-after inner-city addresses. Its famous 9th Avenue SE strip is lined with independent boutiques, craft breweries, restaurants, and galleries. The Bow River borders the community to the north, with Pearce Estate Park and the Inglewood Bird Sanctuary offering rare wilderness within city limits.
          - paragraph [ref=e302]: From the air, Inglewood tells a story of layered history — historic brick commercial buildings, mature tree canopies over century-old residential streets, and the river and sanctuary greens providing a natural counterpoint to the urban fabric. For heritage home listings or properties near the river, aerial photography reveals context that photographs taken at street level simply cannot show.
