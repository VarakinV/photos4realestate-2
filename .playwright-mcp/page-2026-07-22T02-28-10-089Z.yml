          - paragraph [ref=e166]: Seton is Calgary's most ambitious urban district development — a mixed-use community in the southeast designed from the ground up to blend residential, commercial, and healthcare uses. South Health Campus, one of Calgary's newest and most advanced hospitals, anchors the neighbourhood and gives it a vitality that purely residential suburbs lack.
