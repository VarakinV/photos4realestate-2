        - generic [ref=e213]:
          - heading "Crescent Heights — Hilltop Views Over Downtown" [level=2] [ref=e214]
          - paragraph [ref=e215]: Crescent Heights sits on the north escarpment of the Bow River valley, directly across the river from downtown Calgary. It is one of Calgary's oldest communities — established in the early 20th century — and its elevated position makes it one of the most photogenic from the air. Aerial photography here captures the dramatic drop from the community's southern edge down to the Bow River pathway below, with the entire downtown skyline as a backdrop.
          - paragraph [ref=e216]: For listings in Crescent Heights, drone photography is particularly valuable because it communicates the view directly — a view that is one of the community's most prized attributes and often the primary reason buyers choose a home here. No written description can substitute for a single aerial image showing a property perched above the river valley with the Rockies visible on clear days.
