          - heading "Auburn Bay — Lakeside Living from Above" [level=2] [ref=e95]
          - paragraph [ref=e96]: "Auburn Bay is one of Calgary's most recognisable lake communities, built around a private 43-acre freshwater lake in the city's southeast. From the air, the neighbourhood reveals its defining geometry: curved streets orienting toward the water, a central beach club, and a ring of homes that all share access to the lake's amenities including swimming, skating in winter, and a private beach."
          - paragraph [ref=e97]: Aerial shots of Auburn Bay are among the most compelling in Calgary real estate. The contrast between the deep blue lake water, the green park spaces, and the warm rooftops of homes creates a natural composition that no ground-level image can replicate. For sellers listing a home near the water, a drone shot showing their property's proximity to the lake is often the single most effective image in the entire listing.
