          - paragraph [ref=e351]: Aerial photography in Mission is particularly rewarding because the relationship between the built environment and the river greenway is so clear from above. The Elbow River pathway, the Mission footbridge, and the lush green strip along the water provide natural anchors for any aerial composition. Drone shots of Mission also show proximity to the downtown core — something buyers deeply value and that maps alone don't convey as effectively as a real photograph from the sky.
