          - heading "East Village — Calgary's Urban Renaissance" [level=2] [ref=e251]
          - paragraph [ref=e252]: East Village is Calgary's most dramatic urban transformation story. Once a struggling neighbourhood at the edge of downtown, it has been revitalised over the past fifteen years into a vibrant, design-forward urban community that sits at the confluence of the Bow and Elbow rivers. The National Music Centre, Central Library, and a growing cluster of residential towers define its skyline.
          - paragraph [ref=e253]: "Aerial photos of East Village capture something unique: the geographical drama of two rivers meeting, the RiverWalk promenade threading along the water's edge, and the proximity to both downtown towers and the historic Fort Calgary site. For condo listings in East Village, drone photography is practically essential — buyers want to see exactly which way the balcony faces, what's visible from each direction, and how close the property sits to the river."
