            - region "How quickly do you deliver photos and media?" [ref=f3e819]:
              - generic [ref=f3e820]: All deliverables — photos, floor plans, 3D tours, and video — are delivered within 24 hours of your shoot. Next-day delivery is our standard, not an upgrade.
          - generic [ref=f3e821]:
            - button "What areas do you serve outside Calgary?" [ref=f3e822] [cursor=pointer]:
              - generic [ref=f3e823]: What areas do you serve outside Calgary?
              - img [ref=f3e825]
            - region "What areas do you serve outside Calgary?":
              - generic: We serve Calgary and all surrounding areas including Okotoks, Airdrie, Cochrane, Chestermere, High River, Springbank, Bearspaw, Rocky View County, and Banff. Not sure if we cover your area? Give us a call.
          - generic [ref=f3e827]:
            - button "What's included in a standard photography package?" [ref=f3e828] [cursor=pointer]:
              - generic [ref=f3e829]: What's included in a standard photography package?
              - img [ref=f3e831]
            - region "What's included in a standard photography package?":
              - generic: Every package includes professional interior and exterior photos, blue-sky replacement, MLS-ready exports, RMS measurements, iGUIDE 3D virtual tour, floor plans, 9 social media reels, 2 slideshows, 3 property flyers, and 6 branded property websites — all at no extra cost.
          - generic [ref=f3e833]:
            - button "How long does a typical real estate photo shoot take?" [ref=f3e834] [cursor=pointer]:
              - generic [ref=f3e835]: How long does a typical real estate photo shoot take?
              - img [ref=f3e837]
            - region "How long does a typical real estate photo shoot take?":
              - generic: Most Calgary real estate photo shoots take 45 to 90 minutes depending on property size. Larger homes, acreages, and packages that include video, drone or iGUIDE 3D tours typically run 1.5 to 3 hours.
          - generic [ref=f3e839]:
            - button "Do you have a rewards program?" [ref=f3e840] [cursor=pointer]:
              - generic [ref=f3e841]: Do you have a rewards program?
              - img [ref=f3e843]
            - region "Do you have a rewards program?":
              - generic: Yes! Our rewards points program lets you earn points on every completed order and redeem them for discounts on future bookings. The more you book, the more you save.
          - generic [ref=f3e845]:
            - button "Are your RMS measurements and floor plans RECA-compliant?" [ref=f3e846] [cursor=pointer]:
              - generic [ref=f3e847]: Are your RMS measurements and floor plans RECA-compliant?
              - img [ref=f3e849]
            - region "Are your RMS measurements and floor plans RECA-compliant?":
              - generic: Yes. Every floor plan we produce follows Alberta's Residential Measurement Standard (RMS) under RECA, so you can list the square footage with confidence.
          - generic [ref=f3e851]:
            - button "Do I need to be at the property during the shoot?" [ref=f3e852] [cursor=pointer]:
              - generic [ref=f3e853]: Do I need to be at the property during the shoot?
              - img [ref=f3e855]
            - region "Do I need to be at the property during the shoot?":
              - generic: Not usually. Most agents use a lockbox and let us shoot while they handle other business. We simply confirm the address, access details and any special instructions beforehand.
          - generic [ref=f3e857]:
            - button "Can I use the photos on social media and print materials?" [ref=f3e858] [cursor=pointer]:
              - generic [ref=f3e859]: Can I use the photos on social media and print materials?
              - img [ref=f3e861]
            - region "Can I use the photos on social media and print materials?":
              - generic: Yes — you receive a full marketing license to use the images on MLS, your website, social media, brochures and print materials for the duration of the listing.
